<text x="66" y="46" fill="#e9eef5" font-size="24" font-weight="700">dep<tspan fill="#34c46a">guard</tspan></text>
<text x="960" y="34" text-anchor="end" fill="#8b9bb0" font-size="12" letter-spacing="3" font-weight="600">WHAT EACH LAYER STOPS</text>
<text x="960" y="52" text-anchor="end" fill="#8b9bb0" font-size="11.5">defense in depth — grouped by when each layer fires</text>
