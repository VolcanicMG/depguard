<text x="70" y="148.0" fill="#e9eef5" font-size="14.5" font-weight="700" letter-spacing="0.5">AT INSTALL</text>
<text x="70" y="166.0" fill="#8b9bb0" font-size="12.5">name &amp; version</text>
<line x1="254" y1="108" x2="254" y2="194" stroke="#223145"/>
<circle cx="274" cy="117.0" r="3" fill="#34c46a"/>
<text x="286" y="121.0" font-size="12.5"><tspan fill="#e9eef5" font-weight="700">Name gate</tspan><tspan fill="#8b9bb0">  —  typosquats &amp; homoglyphs</tspan></text>
<circle cx="619" cy="117.0" r="3" fill="#34c46a"/>
<text x="631" y="121.0" font-size="12.5"><tspan fill="#e9eef5" font-weight="700">Dep-confusion</tspan><tspan fill="#8b9bb0">  —  internal vs public registry</tspan></text>
<circle cx="274" cy="147.0" r="3" fill="#34c46a"/>
<text x="286" y="151.0" font-size="12.5"><tspan fill="#e9eef5" font-weight="700">Cooldown 14d</tspan><tspan fill="#8b9bb0">  —  day-zero bad versions</tspan></text>
<circle cx="619" cy="147.0" r="3" fill="#34c46a"/>
<text x="631" y="151.0" font-size="12.5"><tspan fill="#e9eef5" font-weight="700">OSV @ resolve</tspan><tspan fill="#8b9bb0">  —  known-bad, before npm sees it</tspan></text>
<circle cx="274" cy="177.0" r="3" fill="#34c46a"/>
<text x="286" y="181.0" font-size="12.5"><tspan fill="#e9eef5" font-weight="700">Signature verify</tspan><tspan fill="#8b9bb0">  —  invalid npm ECDSA signatures</tspan></text>
<circle cx="619" cy="177.0" r="3" fill="#34c46a"/>
<text x="631" y="181.0" font-size="12.5"><tspan fill="#e9eef5" font-weight="700">Exact pinning</tspan><tspan fill="#8b9bb0">  —  silent ^/~ range drift</tspan></text>
<rect x="40" y="222" width="920" height="80" rx="13" fill="#111b29" stroke="#2bb27f" stroke-opacity="0.55"/>
<rect x="40" y="222" width="6" height="80" rx="3" fill="#2bb27f"/>
<text x="70" y="259.0" fill="#e9eef5" font-size="14.5" font-weight="700" letter-spacing="0.5">AT INSTALL</text>
<text x="70" y="277.0" fill="#8b9bb0" font-size="12.5">lifecycle scripts</text>
<line x1="254" y1="234" x2="254" y2="290" stroke="#223145"/>
<circle cx="274" cy="243.0" r="3" fill="#2bb27f"/>
<text x="286" y="247.0" font-size="12.5"><tspan fill="#e9eef5" font-weight="700">Ignore-scripts</tspan><tspan fill="#8b9bb0">  —  install-time code exec (#1 vector)</tspan></text>
<circle cx="619" cy="243.0" r="3" fill="#2bb27f"/>
<text x="631" y="247.0" font-size="12.5"><tspan fill="#e9eef5" font-weight="700">Static scan</tspan><tspan fill="#8b9bb0">  —  net/exec/secrets/eval + injection</tspan></text>
<circle cx="274" cy="273.0" r="3" fill="#2bb27f"/>
<text x="286" y="277.0" font-size="12.5"><tspan fill="#e9eef5" font-weight="700">Box + strace</tspan><tspan fill="#8b9bb0">  —  exfil from approved scripts</tspan></text>
<rect x="40" y="318" width="920" height="80" rx="13" fill="#111b29" stroke="#38bdf8" stroke-opacity="0.55"/>
<rect x="40" y="318" width="6" height="80" rx="3" fill="#38bdf8"/>
<text x="70" y="355.0" fill="#e9eef5" font-size="14.5" font-weight="700" letter-spacing="0.5">ON COMMIT / PR</text>
<text x="70" y="373.0" fill="#8b9bb0" font-size="12.5">guard check</text>
<line x1="254" y1="330" x2="254" y2="386" stroke="#223145"/>
<circle cx="274" cy="339.0" r="3" fill="#38bdf8"/>
<text x="286" y="343.0" font-size="12.5"><tspan fill="#e9eef5" font-weight="700">guard check</tspan><tspan fill="#8b9bb0">  —  new advisories + cooldown sweep</tspan></text>
<circle cx="619" cy="339.0" r="3" fill="#38bdf8"/>
<text x="631" y="343.0" font-size="12.5"><tspan fill="#e9eef5" font-weight="700">Lockfile integrity</tspan><tspan fill="#8b9bb0">  —  off-registry / no-hash entries</tspan></text>
<circle cx="274" cy="369.0" r="3" fill="#38bdf8"/>
<text x="286" y="373.0" font-size="12.5"><tspan fill="#e9eef5" font-weight="700">Secret-file gate</tspan><tspan fill="#8b9bb0">  —  your .env / keys leaving the repo</tspan></text>
<circle cx="619" cy="369.0" r="3" fill="#38bdf8"/>
<text x="631" y="373.0" font-size="12.5"><tspan fill="#e9eef5" font-weight="700">License gate</tspan><tspan fill="#8b9bb0">  —  denied / non-allowed licenses</tspan></text>
<rect x="40" y="414" width="920" height="78" rx="13" fill="#111b29" stroke="#e3b341" stroke-dasharray="6 4" stroke-opacity="0.55"/>
<rect x="40" y="414" width="6" height="78" rx="3" fill="#e3b341"/>
<text x="70" y="450.0" fill="#e9eef5" font-size="14.5" font-weight="700" letter-spacing="0.5">OPT-IN</text>
<text x="70" y="468.0" fill="#8b9bb0" font-size="12.5">flag: per package</text>
<line x1="254" y1="426" x2="254" y2="480" stroke="#223145"/>
<circle cx="274" cy="449.0" r="3" fill="#e3b341"/>
<text x="286" y="453.0" font-size="12.5"><tspan fill="#e9eef5" font-weight="700">Build-provenance</tspan><tspan fill="#8b9bb0">  —  tampered Sigstore / SLSA attestation</tspan></text>
<circle cx="619" cy="449.0" r="3" fill="#e3b341"/>
<text x="631" y="453.0" font-size="12.5"><tspan fill="#e9eef5" font-weight="700">Maintainer-change</tspan><tspan fill="#8b9bb0">  —  account-takeover fingerprint</tspan></text>
<text x="40" y="516" fill="#8b9bb0" font-size="12">No single layer certifies a package clean — each raises attacker cost; together they close the gaps the others leave.</text>
</svg>