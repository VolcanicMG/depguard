<text x="126" y="165" fill="#e9eef5" font-size="17.5" font-weight="700">guard install &lt;pkg&gt;   ·   guard ci</text>
<text x="126" y="188" fill="#8b9bb0" font-size="13">ephemeral proxy spun up for THIS command only</text>
