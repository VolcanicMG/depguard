<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="908" viewBox="0 0 1000 908" font-family="Segoe UI, Helvetica, Arial, sans-serif">
<defs>
<marker id="ag" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#34c46a"/></marker>
<marker id="ar" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#e5677a"/></marker>
</defs>
<rect width="1000" height="908" rx="20" fill="#0a0f18"/>
<rect x="1" y="1" width="998" height="906" rx="19" fill="none" stroke="#223145"/>
<g transform="translate(40,40)">
<path d="M0,-14 L13,-9 V2 C13,11 7,17 0,20 C-7,17 -13,11 -13,2 V-9 Z" fill="none" stroke="#34c46a" stroke-width="2.2"/>
<path d="M-5,1 L-1,5 L6,-4" fill="none" stroke="#34c46a" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
</g>
<text x="66" y="46" fill="#e9eef5" font-size="24" font-weight="700">dep<tspan fill="#34c46a">guard</tspan></text>
<text x="960" y="34" text-anchor="end" fill="#8b9bb0" font-size="12" letter-spacing="3" font-weight="600">HOW IT WORKS</text>
<text x="960" y="52" text-anchor="end" fill="#8b9bb0" font-size="11.5">one package — from install to trusted</text>
<line x1="40" y1="70" x2="960" y2="70" stroke="#223145"/>
<line x1="44" y1="96" x2="74" y2="96" stroke="#34c46a" stroke-width="2.6" marker-end="url(#ag)"/>
<text x="84" y="100" fill="#8b9bb0" font-size="12.5">flows through — safe</text>
<line x1="254" y1="96" x2="284" y2="96" stroke="#e5677a" stroke-width="2.4" stroke-dasharray="5 4" marker-end="url(#ar)"/>
<text x="294" y="100" fill="#8b9bb0" font-size="12.5">stopped / contained — at any gate</text>
<text x="568" y="100" fill="#f0a6b2" font-size="11.5" letter-spacing="1.5" font-weight="700">WHAT GETS STOPPED ✗</text>
<line x1="281.0" y1="196" x2="281.0" y2="220" stroke="#34c46a" stroke-width="2.6" marker-end="url(#ag)"/>
<line x1="281.0" y1="294" x2="281.0" y2="318" stroke="#34c46a" stroke-width="2.6" marker-end="url(#ag)"/>
<line x1="281.0" y1="392" x2="281.0" y2="416" stroke="#34c46a" stroke-width="2.6" marker-end="url(#ag)"/>
<line x1="281.0" y1="490" x2="281.0" y2="514" stroke="#34c46a" stroke-width="2.6" marker-end="url(#ag)"/>
<line x1="281.0" y1="588" x2="281.0" y2="612" stroke="#34c46a" stroke-width="2.6" marker-end="url(#ag)"/>
<line x1="281.0" y1="686" x2="281.0" y2="710" stroke="#34c46a" stroke-width="2.6" marker-end="url(#ag)"/>
<line x1="281.0" y1="784" x2="281.0" y2="808" stroke="#34c46a" stroke-width="2.6" marker-end="url(#ag)"/>
<rect x="44" y="138" width="474" height="58" rx="14" fill="#0f2319" stroke="#2ea44f" stroke-width="1.6"/>
<circle cx="78" cy="167.0" r="16" fill="none" stroke="#34c46a" stroke-width="2"/>
<text x="78" y="173.0" text-anchor="middle" fill="#34c46a" font-size="18" font-weight="700">$</text>
<text x="108" y="163.0" fill="#e9eef5" font-size="17" font-weight="700">guard install &lt;pkg&gt;   ·   guard ci</text>
<text x="108" y="183.0" fill="#8b9bb0" font-size="12.5">ephemeral proxy — spun up for THIS command only</text>
<rect x="44" y="222" width="474" height="72" rx="12" fill="#111b29" stroke="#223145"/>
<rect x="44" y="222" width="6" height="72" rx="3" fill="#34c46a"/>
<circle cx="84" cy="258.0" r="16" fill="none" stroke="#34c46a" stroke-width="2"/>
<text x="84" y="264.0" text-anchor="middle" fill="#34c46a" font-size="16" font-weight="700">1</text>
<text x="114" y="252" fill="#e9eef5" font-size="16.5" font-weight="700">Name gate</text>
<text x="114" y="274" fill="#8b9bb0" font-size="12.5">typosquat · homoglyph · dependency-confusion</text>
<line x1="518" y1="258.0" x2="566" y2="258.0" stroke="#e5677a" stroke-width="2" stroke-dasharray="5 4" marker-end="url(#ar)"/>
<rect x="568" y="231.0" width="388" height="54" rx="10" fill="#241419" stroke="#a33b4a"/>
<text x="584" y="254.0" fill="#f0a6b2" font-size="12.5" font-weight="600">impostor name — blocked</text>
<text x="584" y="272.0" fill="#f0a6b2" font-size="12.5" font-weight="600">before any metadata is served</text>
<rect x="44" y="320" width="474" height="72" rx="12" fill="#111b29" stroke="#223145"/>
<rect x="44" y="320" width="6" height="72" rx="3" fill="#34c46a"/>
<circle cx="84" cy="356.0" r="16" fill="none" stroke="#34c46a" stroke-width="2"/>
<text x="84" y="362.0" text-anchor="middle" fill="#34c46a" font-size="16" font-weight="700">2</text>
<text x="114" y="350" fill="#e9eef5" font-size="16.5" font-weight="700">Cooldown + OSV filter</text>
<text x="114" y="372" fill="#8b9bb0" font-size="12.5">too-fresh &amp; advisory-flagged versions made invisible to npm</text>
<line x1="518" y1="356.0" x2="566" y2="356.0" stroke="#e5677a" stroke-width="2" stroke-dasharray="5 4" marker-end="url(#ar)"/>
<rect x="568" y="329.0" width="388" height="54" rx="10" fill="#241419" stroke="#a33b4a"/>
<text x="584" y="352.0" fill="#f0a6b2" font-size="12.5" font-weight="600">too-fresh / flagged version —</text>
<text x="584" y="370.0" fill="#f0a6b2" font-size="12.5" font-weight="600">never reaches npm at all</text>
<rect x="44" y="418" width="474" height="72" rx="12" fill="#111b29" stroke="#223145"/>
<rect x="44" y="418" width="6" height="72" rx="3" fill="#34c46a"/>
<circle cx="84" cy="454.0" r="16" fill="none" stroke="#34c46a" stroke-width="2"/>
<text x="84" y="460.0" text-anchor="middle" fill="#34c46a" font-size="16" font-weight="700">3</text>
<text x="114" y="448" fill="#e9eef5" font-size="16.5" font-weight="700">npm resolves &amp; installs</text>
<text x="114" y="470" fill="#8b9bb0" font-size="12.5">the safe version · scripts off · pinned exact (no ^/~)</text>
<rect x="44" y="516" width="474" height="72" rx="12" fill="#111b29" stroke="#223145"/>
<rect x="44" y="516" width="6" height="72" rx="3" fill="#38bdf8"/>
<circle cx="84" cy="552.0" r="16" fill="none" stroke="#38bdf8" stroke-width="2"/>
<text x="84" y="558.0" text-anchor="middle" fill="#38bdf8" font-size="16" font-weight="700">4</text>
<text x="114" y="546" fill="#e9eef5" font-size="16.5" font-weight="700">Does it ship a lifecycle script?</text>
<text x="114" y="568" fill="#8b9bb0" font-size="12.5">no (~90%) → installs as-is    ·    yes → ⑤</text>
<rect x="44" y="614" width="474" height="72" rx="12" fill="#111b29" stroke="#223145"/>
<rect x="44" y="614" width="6" height="72" rx="3" fill="#38bdf8"/>
<circle cx="84" cy="650.0" r="16" fill="none" stroke="#38bdf8" stroke-width="2"/>
<text x="84" y="656.0" text-anchor="middle" fill="#38bdf8" font-size="16" font-weight="700">5</text>
<text x="114" y="644" fill="#e9eef5" font-size="16.5" font-weight="700">Scan → approve once → box + strace</text>
<text x="114" y="666" fill="#8b9bb0" font-size="12.5">no network · no secrets · every syscall watched</text>
<line x1="518" y1="650.0" x2="566" y2="650.0" stroke="#e5677a" stroke-width="2" stroke-dasharray="5 4" marker-end="url(#ar)"/>
<rect x="568" y="623.0" width="388" height="54" rx="10" fill="#241419" stroke="#a33b4a"/>
<text x="584" y="646.0" fill="#f0a6b2" font-size="12.5" font-weight="600">exfil intent — output discarded,</text>
<text x="584" y="664.0" fill="#f0a6b2" font-size="12.5" font-weight="600">approval auto-revoked</text>
<rect x="44" y="712" width="474" height="72" rx="12" fill="#111b29" stroke="#223145"/>
<rect x="44" y="712" width="6" height="72" rx="3" fill="#34c46a"/>
<circle cx="84" cy="748.0" r="16" fill="none" stroke="#34c46a" stroke-width="2"/>
<text x="84" y="754.0" text-anchor="middle" fill="#34c46a" font-size="16" font-weight="700">6</text>
<text x="114" y="742" fill="#e9eef5" font-size="16.5" font-weight="700">On commit / PR — guard check re-scan</text>
<text x="114" y="764" fill="#8b9bb0" font-size="12.5">advisories · cooldown · integrity · secret-files</text>
<line x1="518" y1="748.0" x2="566" y2="748.0" stroke="#e5677a" stroke-width="2" stroke-dasharray="5 4" marker-end="url(#ar)"/>
<rect x="568" y="721.0" width="388" height="54" rx="10" fill="#241419" stroke="#a33b4a"/>
<text x="584" y="744.0" fill="#f0a6b2" font-size="12.5" font-weight="600">a dep gone bad later —</text>
<text x="584" y="762.0" fill="#f0a6b2" font-size="12.5" font-weight="600">CI blocks the merge</text>
<rect x="44" y="810" width="474" height="58" rx="14" fill="#0f2319" stroke="#2ea44f" stroke-width="1.6"/>
<circle cx="78" cy="839.0" r="16" fill="none" stroke="#34c46a" stroke-width="2"/>
<text x="78" y="845.0" text-anchor="middle" fill="#34c46a" font-size="18" font-weight="700">✓</text>
<text x="108" y="835.0" fill="#e9eef5" font-size="17" font-weight="700">installed &amp; trusted</text>
<text x="108" y="855.0" fill="#8b9bb0" font-size="12.5">and re-checked on every future commit / PR</text>
</svg>