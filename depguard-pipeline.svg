<text x="960" y="34" text-anchor="end" fill="#8b9bb0" font-size="12" letter-spacing="3" font-weight="600">PACKAGE LIFECYCLE</text>
<text x="960" y="52" text-anchor="end" fill="#8b9bb0" font-size="11.5">how one install travels through every layer</text>
<line x1="40" y1="70" x2="960" y2="70" stroke="#223145"/>
<g>
